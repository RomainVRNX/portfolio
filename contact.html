<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Romain Vernay</title>
  <meta name="description" content="Get in touch with Romain Vernay for underwater filmmaking, photography collaborations, and creative projects.">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header header--scrolled" id="header">
    <a href="index.html" class="logo">ROMAIN VERNAY<span>.</span></a>
    <nav class="nav-desktop" id="nav-desktop">
      <a href="index.html" class="nav-desktop__link">Home</a>
      <a href="portfolio.html" class="nav-desktop__link">Stories</a>
      <a href="the-journey.html" class="nav-desktop__link">The Journey</a>
      <a href="contact.html" class="nav-desktop__link nav-desktop__link--active">Contact</a>
    </nav>
    <div class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </div>
  </header>

  <nav class="nav-mobile" id="nav-mobile">
    <a href="index.html" class="nav-mobile__link">Home</a>
    <a href="portfolio.html" class="nav-mobile__link">Stories</a>
    <a href="the-journey.html" class="nav-mobile__link">The Journey</a>
    <a href="contact.html" class="nav-mobile__link">Contact</a>
  </nav>

  <!-- ===== PAGE HERO ===== -->
  <section class="page-hero reveal" id="page-hero">
    <div class="page-hero__inner">
      <p class="page-hero__kicker">Let's Connect</p>
      <h1 class="page-hero__title">Available for <em>collaborations</em></h1>
      <div class="page-hero__divider"></div>
    </div>
  </section>

  <!-- ===== CONTACT SECTION ===== -->
  <section class="section" id="contact-section">
    <div class="section__inner">
      <div class="contact-split reveal">

        <!-- LEFT — Form -->
        <div class="contact-form-col">
          <h2 class="contact-form__title">Send a message</h2>
          <form class="contact-form" id="contact-form" action="#" method="POST">
            <div class="contact-form__group">
              <label for="field-name" class="contact-form__label">Name</label>
              <input
                type="text"
                class="contact-form__input"
                id="field-name"
                name="name"
                placeholder="Your full name"
                required
                autocomplete="name"
              >
            </div>
            <div class="contact-form__group">
              <label for="field-email" class="contact-form__label">Email</label>
              <input
                type="email"
                class="contact-form__input"
                id="field-email"
                name="email"
                placeholder="your@email.com"
                required
                autocomplete="email"
              >
            </div>
            <div class="contact-form__group">
              <label for="field-project" class="contact-form__label">Project</label>
              <textarea
                class="contact-form__input contact-form__textarea"
                id="field-project"
                name="project"
                placeholder="Tell me about your project, timeline, and vision…"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn btn--orange contact-form__submit" id="btn-send">
              Send Message
              <svg class="btn__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
          </form>
        </div>

        <!-- RIGHT — Direct Connect -->
        <div class="contact-info-col">
          <h2 class="contact-info__title">Direct Connect</h2>

          <!-- Email -->
          <div class="contact-info__block">
            <div class="contact-info__icon">
              <i class="fa-solid fa-envelope"></i>
            </div>
            <div>
              <p class="contact-info__label">Email</p>
              <a href="mailto:contact@romainvrnx.com" class="contact-info__value contact-info__link" id="contact-email">
                contact@romainvrnx.com
              </a>
            </div>
          </div>

          <!-- Location -->
          <div class="contact-info__block">
            <div class="contact-info__icon">
              <i class="fa-solid fa-location-dot"></i>
            </div>
            <div>
              <p class="contact-info__label">Location</p>
              <p class="contact-info__value">Moalboal, Philippines</p>
              <p class="contact-info__value contact-info__value--dim">Rhône, France</p>
            </div>
          </div>

          <!-- Social -->
          <div class="contact-info__block">
            <div class="contact-info__icon">
              <i class="fa-solid fa-share-nodes"></i>
            </div>
            <div>
              <p class="contact-info__label">Socials</p>
              <div class="contact-socials">
                <a href="#" class="contact-social-btn" id="contact-ig">
                  <i class="fa-brands fa-instagram"></i>
                  <span>Instagram</span>
                </a>
                <a href="#" class="contact-social-btn" id="contact-yt">
                  <i class="fa-brands fa-youtube"></i>
                  <span>YouTube</span>
                </a>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer-full" id="footer">
    <div class="footer-full__inner">
      <div class="footer-full__socials">
        <a href="#" aria-label="Instagram" class="footer-social" id="footer-ig"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" aria-label="YouTube" class="footer-social" id="footer-yt"><i class="fa-brands fa-youtube"></i></a>
      </div>
      <p class="footer-full__copy">© 2026 ROMAIN VERNAY<span>.</span></p>
    </div>
  </footer>

  <script src="site-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
